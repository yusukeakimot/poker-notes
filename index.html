// Calculate pot size in BB at the start of each street
const calcPots = (hand) => {
const ante = hand.ante || false;
let pot = ante ? 2.5 : 1.5;

// Preflop blind already-posted amounts per position
const BLIND_POSTED = { “BB”:1, “SB”:0.5, “BTN/SB”:0.5 };
const getBlind = pos => BLIND_POSTED[(pos||””).toUpperCase()] || 0;
const getActorPos = actor => {
if (actor===“hero”) return hand.heroPos||””;
const v=(hand.villains||[]).find(v=>v.id===actor);
return v?v.pos||””:””;
};

// size-label → total bet amount in BB
// For open bets: “2x” = 2×BB = 2BB
// For raises: “2x” = 2×currentBet, “3x” = 3×currentBet, etc.
// pot-relative: fraction of current pot
const sizeLabel2BB = (size, currentPot, currentBet, isRaise) => {
if(!size) return 0;
const base = isRaise ? currentBet : 1; // raises are multiples of current bet, bets are multiples of 1BB
if(size===“min”)    return currentBet * 2;   // min-raise = 2× current bet
if(size===“2x”)     return base * 2;
if(size===“2.5x”)   return base * 2.5;
if(size===“3x”)     return base * 3;
if(size===“4x”)     return base * 4;
if(size===“5x+”)    return base * 5;
if(size===“¼pot”)   return currentPot * 0.25;
if(size===“⅓pot”)   return currentPot * (1/3);
if(size===“½pot”)   return currentPot * 0.5;
if(size===“⅔pot”)   return currentPot * (2/3);
if(size===“¾pot”)   return currentPot * 0.75;
if(size===“pot”)    return currentPot;
return 0;
};

const addStreetActions = (street) => {
const committed = {};
// Preflop: pre-credit already-posted blind amounts
if(street===“Preflop”){
(hand.streets[street]||[]).forEach(a=>{
if(!(a.actor in committed))
committed[a.actor] = getBlind(getActorPos(a.actor));
});
}
let currentBet = street===“Preflop” ? 1 : 0;

// ── Hand Range Grid ────────────────────────────────────────────────────────
function HandRangeGrid({ selected, onChange, mode=“multi”, accentColor=”#b08820” }) {
const [isDragging,setDragging]=useState(false);
const [dragMode,  setDragMode]=useState(null);
const [cellSize,  setCellSize]=useState(26);
const containerRef=useRef(null);
const selRef=useRef(selected);
useEffect(()=>{ selRef.current=selected; },[selected]);

useEffect(()=>{
const measure=()=>{
if(!containerRef.current)return;
const w=containerRef.current.offsetWidth;
// 16px label col + 13 cells with 1px gap each
const sz=Math.floor((w-20)/13);
setCellSize(Math.max(18,Math.min(sz,32)));
};
measure();
const ro=new ResizeObserver(measure);
if(containerRef.current)ro.observe(containerRef.current);
return()=>ro.disconnect();
},[]);

const isSelected=key=>mode===“single”?selected===key:(selected||[]).includes(key);
const applyToKey=(key,fm)=>{
if(mode===“single”){onChange(selected===key?null:key);return;}
const arr=selRef.current||[], dm=fm??dragMode;
if(dm===“add”&&!arr.includes(key)){const n=[…arr,key];selRef.current=n;onChange(n);}
if(dm===“remove”&&arr.includes(key)){const n=arr.filter(k=>k!==key);selRef.current=n;onChange(n);}
};
const startDrag=(key,e)=>{
e.preventDefault();
if(mode===“single”){onChange(selected===key?null:key);return;}
const arr=selRef.current||[], dm=arr.includes(key)?“remove”:“add”;
setDragging(true);setDragMode(dm);
const n=dm===“add”?[…arr,key]:arr.filter(k=>k!==key);
selRef.current=n;onChange(n);
};
const endDrag=()=>setDragging(false);
const getKeyFromTouch=t=>document.elementFromPoint(t.clientX,t.clientY)?.dataset?.rangekey||null;
const handleTouchMove=e=>{e.preventDefault();if(!isDragging||mode===“single”)return;const k=getKeyFromTouch(e.touches[0]);if(k)applyToKey(k);};

const cellBg=(r,c,sel)=>{
const t=cellType(r,c);
if(sel){if(t===“pair”)return accentColor;if(t===“suited”)return mode===“single”?”#3070c0”:”#208050”;return mode===“single”?”#3070c0”:”#a05020”;}
if(t===“pair”)return”#f5ead0”;if(t===“suited”)return”#e8f5ee”;return”#faf0e8”;
};
const cellBorder=(r,c,sel)=>{
if(sel)return”transparent”;const t=cellType(r,c);
if(t===“pair”)return”#d4c090”;if(t===“suited”)return”#90d0a0”;return”#d0a878”;
};
const count=mode===“single”?(selected?1:0):totalCombos(selected);

return(
<div style={{ userSelect:“none”,touchAction:“none” }}>
<div style={{ display:“flex”,gap:10,marginBottom:8,flexWrap:“wrap”,alignItems:“center” }}>
{[[“ペア”,”#f5ead0”,”#b08820”],[“スーテッド”,”#e8f5ee”,”#208050”],[“オフスート”,”#faf0e8”,”#a05020”]].map(([l,bg,c])=>(
<div key={l} style={{ display:“flex”,gap:4,alignItems:“center” }}><div style={{ width:10,height:10,borderRadius:2,background:bg,border:`1px solid ${c}44` }}/><span style={{ fontSize:10,color:c,fontFamily:FONT }}>{l}</span></div>
))}
<span style={{ marginLeft:“auto”,fontSize:11,color:accentColor,fontFamily:FONT }}>{mode===“single”?(selected||“未選択”):`${count}コンボ選択中`}</span>
{mode===“multi”&&count>0&&<button onClick={()=>onChange([])} style={{ background:“none”,border:“1px solid #f0a0a0”,borderRadius:4,padding:“2px 8px”,color:”#c04040”,fontSize:10,cursor:“pointer”,fontFamily:FONT }}>クリア</button>}
{mode===“single”&&selected&&<button onClick={()=>onChange(null)} style={{ background:“none”,border:“1px solid #f0a0a0”,borderRadius:4,padding:“2px 8px”,color:”#c04040”,fontSize:10,cursor:“pointer”,fontFamily:FONT }}>クリア</button>}
</div>
<div ref={containerRef} style={{ width:“100%” }}>
<div onMouseUp={endDrag} onMouseLeave={endDrag} onTouchMove={handleTouchMove} onTouchEnd={endDrag}>
<div style={{ display:“flex”,marginLeft:18 }}>
{RANKS.map(r=><div key={r} style={{ width:cellSize,textAlign:“center”,fontSize:Math.max(7,cellSize*0.32),color:”#aaa”,marginBottom:2,flexShrink:0,fontFamily:FONT }}>{r}</div>)}
</div>
{RANKS.map(row=>(
<div key={row} style={{ display:“flex”,alignItems:“center”,marginBottom:1 }}>
<div style={{ width:16,textAlign:“center”,fontSize:Math.max(7,cellSize*0.32),color:”#aaa”,marginRight:2,flexShrink:0,fontFamily:FONT }}>{row}</div>
{RANKS.map(col=>{
const key=cellLabel(row,col),sel=isSelected(key);
const fs=Math.max(6,cellSize*0.28);
return(
<div key={col} data-rangekey={key}
onMouseDown={e=>startDrag(key,e)}
onMouseEnter={()=>{if(isDragging&&mode!==“single”)applyToKey(key);}}
onTouchStart={e=>startDrag(key,e)} title={key}
style={{ width:cellSize,height:Math.round(cellSize*0.82),flexShrink:0,borderRadius:2,marginRight:1,background:cellBg(row,col,sel),border:`1px solid ${cellBorder(row,col,sel)}`,display:“flex”,alignItems:“center”,justifyContent:“center”,cursor:“pointer”,transition:“background .08s”,fontSize:fs,fontWeight:sel?“bold”:“normal”,color:sel?”#fff”:”#555”,fontFamily:“monospace”,touchAction:“none” }}
>{key}</div>
);
})}
</div>
))}
</div>
</div>
{mode===“multi”&&(
<div style={{ display:“flex”,gap:5,marginTop:8,flexWrap:“wrap” }}>
{[{label:“プレミアム”,keys:[“AA”,“KK”,“QQ”,“JJ”,“AKs”,“AKo”]},{label:“強いハンド”,keys:[“TT”,“99”,“AQs”,“AQo”,“AJs”,“KQs”]},{label:“ブロードウェイ”,keys:[“ATo”,“AJo”,“KQo”,“KJs”,“KJo”,“QJs”]},{label:“全スーテッドA”,keys:RANKS.slice(1).map(r=>“A”+r+“s”)}].map(({label,keys})=>(
<button key={label} onClick={()=>{const cur=selected||[];const allIn=keys.every(k=>cur.includes(k));onChange(allIn?cur.filter(k=>!keys.includes(k)):[…new Set([…cur,…keys])]);}} style={{ …ghostBtn,fontSize:10,padding:“3px 9px” }}>{label}</button>
))}
</div>
)}
</div>
);
}

// ── Poker Table ────────────────────────────────────────────────────────────
function PokerTable({ tableSize, selected, onChange, heroPos, heroBB, onChangeHeroBB, villains, onChangeHeroPos, onChangeVillainPos, onChangeVillainBB, mode=“single” }) {
const size=tableSize||“6max”;
const angles=SEAT_ANGLES[size]||SEAT_ANGLES[“6max”];
const seats=Object.keys(angles);
const R=118,CX=130,CY=130;

const handleClick=seat=>{
if(mode===“single”){onChange(selected===seat?””:seat);return;}
if(heroPos===seat){onChangeHeroPos(””);return;}
const vi=(villains||[]).findIndex(v=>v.pos===seat);
if(vi>=0){onChangeVillainPos(villains[vi].id,””);return;}
const unassignedV=(villains||[]).find(v=>!v.pos);
if(unassignedV){onChangeVillainPos(unassignedV.id,seat);return;}
if(!heroPos){onChangeHeroPos(seat);return;}
if(villains&&villains.length>0)onChangeVillainPos(villains[0].id,seat);
};

/>
<span style={{ fontSize:9,color:”#aaa”,fontFamily:FONT }}>BB</span>

return(

{bbInput(heroBB, val=>onChangeHeroBB&&onChangeHeroBB(val), HERO_COLOR)}

</div>
)}

      )}

      {/* Hero hand */}
      <div style={{ marginBottom:14 }}>
        <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:6 }}>
          <span style={{ fontSize:10,padding:"2px 10px",borderRadius:20,background:HERO_BG,color:HERO_COLOR,border:`1px solid ${HERO_BORDER}`,fontFamily:FONT }}>自分のハンド</span>
          <button onClick={()=>setShowHeroGrid(v=>!v)} style={{ background:"none",border:`1px dashed ${HERO_COLOR}66`,borderRadius:6,padding:"2px 10px",color:HERO_COLOR,fontSize:11,cursor:"pointer",fontFamily:FONT,display:"inline-flex",alignItems:"center",gap:4 }}>
            {showHeroGrid ? "閉じる" : hand.heroHand ? (()=>{ const [c1,c2]=heroHandToCards(hand.heroHand); return <span style={{ display:"inline-flex",gap:3,alignItems:"center" }}>{[c1,c2].map((card,i)=>{ const r=card.slice(0,-1),s=card.slice(-1),isR=s==="h"||s==="d"; return <span key={i} style={{ fontSize:11,padding:"2px 5px",borderRadius:4,background:"#fff",color:isR?"#e05a5a":"#1a1a1a",fontFamily:"monospace",fontWeight:"bold",border:"1px solid #bbb",lineHeight:1.3 }}>{r}{CARD_SUIT_SYMBOL[s]}</span>; })}<span style={{ fontSize:10,color:"#aaa" }}>✎</span></span>; })() : "選択する"}
          </button>
        </div>
        {showHeroGrid&&<div style={{ background:"#f8f8f6",borderRadius:10,padding:"12px",border:`1px solid ${HERO_BORDER}` }}><HandRangeGrid selected={hand.heroHand} onChange={v=>onChange({...hand,heroHand:v})} mode="single" accentColor={HERO_COLOR}/></div>}
      </div>

      {/* Board */}
      <BoardSelector board={hand.board} onChange={v=>onChange({...hand,board:v})}/>

      {/* Streets */}
      {(()=>{ const pots = calcPots(hand); return STREETS.map(street=>(
        <div key={street} style={{ marginBottom:16 }}>
          <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap" }}>
            <span style={{ fontSize:10,padding:"2px 10px",borderRadius:20,background:STREET_COLOR[street]+"18",color:STREET_COLOR[street],border:`1px solid ${STREET_COLOR[street]}44`,letterSpacing:"0.08em",fontFamily:FONT }}>{street.toUpperCase()}</span>
            {street!=="Preflop"&&<span style={{ fontSize:10,color:"#aaa",fontFamily:FONT,background:"#f5f5f2",border:"1px solid #e8e8e4",borderRadius:10,padding:"1px 8px" }}>ポット <strong style={{ color:"#666" }}>{pots[street]}BB</strong></span>}
            {street==="Preflop"&&<span style={{ fontSize:10,color:"#aaa",fontFamily:FONT,background:"#f5f5f2",border:"1px solid #e8e8e4",borderRadius:10,padding:"1px 8px" }}>初期 <strong style={{ color:"#666" }}>{pots.Preflop}BB</strong></span>}
            {villains.map((v,vi)=>(
              <button key={v.id} onClick={()=>addAction(street,v.id)} style={{ background:"none",border:`1px dashed ${VILLAIN_COLORS[vi%VILLAIN_COLORS.length]}88`,borderRadius:6,padding:"2px 8px",color:VILLAIN_COLORS[vi%VILLAIN_COLORS.length],fontSize:10,cursor:"pointer",fontFamily:FONT }}>+ {villains.length>1?`相手${vi+1}`:"相手"}</button>
            ))}
            <button onClick={()=>addAction(street,"hero")} style={{ background:"none",border:`1px dashed ${HERO_COLOR}66`,borderRadius:6,padding:"2px 8px",color:HERO_COLOR,fontSize:10,cursor:"pointer",fontFamily:FONT }}>+ 自分</button>
          </div>
          {(hand.streets[street]||[]).length===0&&<div style={{ fontSize:11,color:"#ccc",padding:"4px 0",fontStyle:"italic",fontFamily:FONT }}>アクションなし</div>}
          {(hand.streets[street]||[]).map((act,i)=>(
            <ActionRow key={act.id} act={act} index={i}
              isFirst={i===0} isLast={i===(hand.streets[street]||[]).length-1}
              villains={villains} hand={hand}

              onMoveUp={()=>moveAction(street,i,-1)}
              onMoveDown={()=>moveAction(street,i,1)}/>
          ))}
        </div>
      ));})()}

      {/* Action Summary Timeline */}
      {(()=>{
        const streetData = STREETS.map(street=>({
          street,
          acts:(hand.streets[street]||[]).filter(a=>a.action),
        }));
        const hasAny = streetData.some(d=>d.acts.length>0);
        if(!hasAny) return null;

        const pots = calcPots(hand);
        const board = hand.board||{flop:[null,null,null],turn:null,river:null};

        // Compute per-action BB amounts by simulating street-by-street
        const actionBBMap = {}; // actId → BB amount involved
        const endPots = {};
        (() => {
          let pot2 = hand.ante ? 2.5 : 1.5;
          const BLIND2 = { "BB":1, "SB":0.5, "BTN/SB":0.5 };
          const getB2 = pos => BLIND2[(pos||"").toUpperCase()]||0;
          const getAP = actor => {
            if(actor==="hero") return hand.heroPos||"";
            const v=(hand.villains||[]).find(v=>v.id===actor);
            return v?v.pos||"":"";
          };
          const sz2bb = (size,pot,cb,isR) => {
            if(!size) return 0;
            const base=isR?cb:1;
            if(size==="min") return cb*2;
            if(size==="2x") return base*2; if(size==="2.5x") return base*2.5;
            if(size==="3x") return base*3; if(size==="4x") return base*4; if(size==="5x+") return base*5;
            if(size==="¼pot") return pot*0.25; if(size==="⅓pot") return pot*(1/3);
            if(size==="½pot") return pot*0.5; if(size==="⅔pot") return pot*(2/3);
            if(size==="¾pot") return pot*0.75; if(size==="pot") return pot;
            return 0;
          };
          STREETS.forEach(street=>{
            const committed={};
            if(street==="Preflop"){
              (hand.streets[street]||[]).forEach(a=>{ if(!(a.actor in committed)) committed[a.actor]=getB2(getAP(a.actor)); });
            }
            let cb=street==="Preflop"?1:0;
            (hand.streets[street]||[]).forEach(a=>{
              if(!a.action)return;
              if(!(a.actor in committed))committed[a.actor]=0;
              if(["Bet","Raise","3Bet","4Bet+","AllIn"].includes(a.action)){
                const isR=["Raise","3Bet","4Bet+"].includes(a.action)&&cb>0;
                // AllIn: use actor's actual BB stack if available
                const actorStack = a.action==="AllIn" ? (()=>{
                  if(a.actor==="hero") return parseFloat(hand.heroBB)||0;
                  const v=(hand.villains||[]).find(v=>v.id===a.actor);
                  return parseFloat(v?.bb)||0;
                })() : 0;
                const tb = actorStack>0 ? actorStack : sz2bb(a.size,pot2,cb,isR);
                if(tb>0){
                  const net=Math.max(0,tb-committed[a.actor]);
                  actionBBMap[a.id]=Math.round(net*10)/10; // ★ 追加投入額
                  pot2+=net; committed[a.actor]=tb; cb=tb;
                }
              } else if(a.action==="Call"){
                const net=Math.max(0,cb-committed[a.actor]);
                actionBBMap[a.id]=Math.round(net*10)/10; // ★ 実際の追加額
                pot2+=net; committed[a.actor]=cb;
              } else if(a.action==="Limp"){
                const net=Math.max(0,1-committed[a.actor]);
                actionBBMap[a.id]=Math.round(net*10)/10; // ★ 実際の追加額
                pot2+=net; committed[a.actor]=1; if(cb<1)cb=1;
              }
            });
            endPots[street]=Math.round(pot2*10)/10;
          });
        })();

        const getActorInfo = actor => {
          if(actor==="hero") return { label:"自分", col:HERO_COLOR, bg:HERO_BG, bdr:HERO_BORDER };
          const vi=villains.findIndex(v=>v.id===actor);
          const i=vi>=0?vi:0;
          return { label:villains.length>1?`相手${i+1}`:"相手", col:VILLAIN_COLORS[i%VILLAIN_COLORS.length], bg:VILLAIN_BGS[i%VILLAIN_BGS.length], bdr:VILLAIN_BORDERS[i%VILLAIN_BORDERS.length] };
        };

        // Actor order = first appearance order across all streets' actions
        const actorOrder = [];
        streetData.forEach(({acts})=>acts.forEach(a=>{
          if(!actorOrder.includes(a.actor)) actorOrder.push(a.actor);
        }));

        const streetsWithActs = streetData.filter(d=>d.acts.length>0);

        // Board cards for each street header
        const streetCards = {
          Preflop: [],
          Flop: (board.flop||[]).filter(Boolean),
          Turn: board.turn ? [board.turn] : [],
          River: board.river ? [board.river] : [],
        };

        const MiniCardInline = ({card}) => {
          if(!card) return null;
          const r=card.slice(0,-1), s=card.slice(-1);
          const isRed = s==="h"||s==="d";
          return (
            <span style={{ display:"inline-flex",flexDirection:"column",alignItems:"center",justifyContent:"center",width:16,height:22,borderRadius:3,background:"#fff",border:"1px solid #bbb",boxShadow:"0 1px 2px rgba(0,0,0,0.12)",flexShrink:0 }}>
              <span style={{ fontSize:8,fontWeight:"bold",color:isRed?"#e05a5a":"#1a1a1a",lineHeight:1,fontFamily:"Georgia,serif" }}>{r}</span>
              <span style={{ fontSize:7,color:isRed?"#e05a5a":"#1a1a1a",lineHeight:1 }}>{CARD_SUIT_SYMBOL[s]}</span>
            </span>
          );
        };

        return(
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:10,color:"#888",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8,fontFamily:FONT }}>アクション総括</div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ borderCollapse:"separate",borderSpacing:"3px 2px",width:"100%" }}>
                <thead>
                  <tr>
                    <th style={{ width:44 }}/>
                    {streetsWithActs.map(({street})=>(
                      <th key={street} style={{ padding:"0 2px 6px",textAlign:"center",verticalAlign:"bottom" }}>
                        <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                          {/* Board cards for this street */}
                          {streetCards[street].length>0&&(
                            <div style={{ display:"flex",gap:2,justifyContent:"center" }}>
                              {streetCards[street].map((card,i)=><MiniCardInline key={i} card={card}/>)}
                            </div>
                          )}
                          <span style={{ fontSize:9,padding:"1px 7px",borderRadius:10,background:STREET_COLOR[street]+"15",color:STREET_COLOR[street],border:`1px solid ${STREET_COLOR[street]}44`,fontFamily:FONT,letterSpacing:"0.05em",whiteSpace:"nowrap" }}>
                            {street.toUpperCase()}
                          </span>
                          <span style={{ fontSize:9,color:"#aaa",fontFamily:FONT,background:"#f5f5f2",border:"1px solid #e8e8e4",borderRadius:8,padding:"0px 6px",whiteSpace:"nowrap" }}>
                            {street==="Preflop"?"初期":"開始"} <strong style={{ color:"#666" }}>{pots[street]}BB</strong>
                          </span>
                        </div>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {/* 時系列順: 各ストリートの最大アクション数だけ行を作り、
                      その行番号に対応するアクションを各アクター列に配置 */}
                  {(()=>{
                    const maxRows = Math.max(0, ...streetsWithActs.map(({street})=>
                      (hand.streets[street]||[]).filter(a=>a.action).length
                    ));
                    return Array.from({length:maxRows}).map((_,rowIdx)=>(
                      <tr key={rowIdx}>
                        {/* Actor label column: show label of the actor who acts in this row
                            (use the first street that has an action at this rowIdx) */}
                        <td style={{ paddingRight:4,textAlign:"right",verticalAlign:"middle",whiteSpace:"nowrap",minWidth:40 }}>
                          {(()=>{
                            // find which actor acts at rowIdx in any street
                            for(const {street} of streetsWithActs){
                              const seqActs=(hand.streets[street]||[]).filter(a=>a.action);
                              if(seqActs[rowIdx]){
                                const actor=seqActs[rowIdx].actor;
                                const {label,col}=getActorInfo(actor);
                                return <span style={{ fontSize:10,fontWeight:"bold",color:col,fontFamily:FONT }}>{label}</span>;
                              }
                            }
                            return null;
                          })()}
                        </td>
                        {streetsWithActs.map(({street})=>{
                          const seqActs=(hand.streets[street]||[]).filter(a=>a.action);
                          const act=seqActs[rowIdx]||null;
                          if(!act) return <td key={street} style={{ padding:"1px 2px" }}><div style={{ height:26 }}/></td>;
                          const {bg,bdr}=getActorInfo(act.actor);
                          const acol=ACTION_COLOR[act.action]||"#888";
                          const bbAmt=actionBBMap[act.id];
                          const showBB=bbAmt!=null&&["Bet","Raise","3Bet","4Bet+","AllIn","Call","Limp"].includes(act.action);
                          return(
                            <td key={street} style={{ padding:"1px 2px",verticalAlign:"middle",textAlign:"center" }}>
                              <div style={{ padding:"3px 6px",borderRadius:6,background:bg,border:`1px solid ${bdr}`,fontSize:10,fontFamily:FONT,color:acol,fontWeight:"bold",whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:3 }}>
                                <span style={{ fontSize:8,color:"#ccc",marginRight:1 }}>#{rowIdx+1}</span>
                                <span>{act.action}</span>
                                {showBB&&<span style={{ fontSize:9,color:"#888",fontWeight:"normal" }}>{bbAmt}BB</span>}
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    ));
                  })()}
                  {/* End-of-street pot row */}
                  <tr>
                    <td style={{ paddingRight:4,textAlign:"right",paddingTop:4 }}>
                      <span style={{ fontSize:9,color:"#aaa",fontFamily:FONT }}>計</span>
                    </td>
                    {streetsWithActs.map(({street})=>(
                      <td key={street} style={{ padding:"4px 2px 1px",textAlign:"center",borderTop:"1px solid #eee" }}>
                        <span style={{ fontSize:10,fontFamily:FONT,color:"#666",background:"#f5f5f2",border:"1px solid #e0e0dc",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap" }}>
                          <strong style={{ color:"#444" }}>{endPots[street]}BB</strong>
                        </span>
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}

      <FLabel label="ハンドメモ">

        onClick={()=>{setShowExportModal(false);setExportMsg("");}}>
        <div onClick={e=>e.stopPropagation()} style={{ background:"#fff",borderRadius:14,padding:20,width:"100%",maxWidth:480,boxShadow:"0 8px 32px rgba(0,0,0,0.2)" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
            <span style={{ fontSize:13,fontWeight:"bold",color:"#333",fontFamily:FONT }}>データをコピーして保存</span>
            <button onClick={()=>{setShowExportModal(false);setExportMsg("");}} style={{ background:"none",border:"none",fontSize:16,color:"#c04040",cursor:"pointer" }}>✕</button>
          </div>
          <p style={{ fontSize:11,color:"#888",marginBottom:8,fontFamily:FONT }}>下のテキストを全選択してコピーし、メモアプリやファイルに貼り付けて保存してください。</p>
          <textarea readOnly value={exportJson}
            style={{ width:"100%",height:160,fontSize:10,fontFamily:"monospace",border:"1px solid #ddd",borderRadius:8,padding:8,resize:"none",background:"#f8f8f6",color:"#333",boxSizing:"border-box" }}
            onFocus={e=>e.target.select()}/>
          <button onClick={async()=>{
            try{ await navigator.clipboard.writeText(exportJson); setExportMsg("✓ コピー済み"); setTimeout(()=>setExportMsg(""),3000); }
            catch{}
          }} style={{ marginTop:10,width:"100%",padding:"9px 0",borderRadius:8,background:"#2a7a40",color:"#fff",border:"none",fontSize:13,cursor:"pointer",fontFamily:FONT,fontWeight:"bold" }}>
            {exportMsg==="✓ コピー済み" ? "✓ コピー済み" : "クリップボードにコピー"}
          </button>
        </div>
      </div>
    )}

    {/* Header */}
    <div style={{ padding:"16px 20px 12px",borderBottom:"1px solid #e0e0dc",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
        <div>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:1 }}>
            {SUITS.map((s,i)=><span key={i} style={{ fontSize:16,color:SUIT_COLOR(s) }}>{s}</span>)}
            <h1 style={{ margin:"0 0 0 4px",fontSize:16,fontWeight:"bold",letterSpacing:"0.18em",textTransform:"uppercase",color:"#b08820",fontFamily:FONT }}>Player's Book</h1>
          </div>
          <p style={{ margin:0,fontSize:8,color:"#ccc",letterSpacing:"0.2em",textTransform:"uppercase",fontFamily:FONT }}>Poker Read & Hand Notebook</p>
        </div>
        <div style={{ display:"flex",gap:6,alignItems:"center" }}>
          <button onClick={()=>{ exportData(); setShowExportModal(true); }}
            style={{ display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:FONT,
              background: exportMsg==="✓ コピー済み" ? "#2a7a40" : "#f0f5e8",
              color: exportMsg==="✓ コピー済み" ? "#fff" : "#2a7a40",
              border:"1px solid #a8d0a8",fontWeight:"bold" }}>
            {exportMsg==="✓ コピー済み" ? exportMsg : "↓ 書き出し"}
          </button>
          <label style={{ display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:FONT,background:"#e8f0ff",color:"#3060a0",border:"1px solid #a0b8e0",fontWeight:"bold" }}>
            ↑ 読み込み
            <input type="file" accept=".json" onChange={importData} style={{ display:"none" }}/>
          </label>
        </div>
      </div>
    </div>

    {/* LIST */}
    {view==="list"&&(
      <div style={{ padding:"16px" }}>
        <div style={{ display:"flex",gap:8,marginBottom:14 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="名前・傾向で検索..." style={{ ...inp,flex:1 }}/>
          <button onClick={openNew} style={{ background:"#2a7a40",border:"none",borderRadius:8,padding:"8px 16px",color:"#fff",fontSize:13,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap",fontWeight:"bold" }}>＋ 追加</button>
        </div>
        {filtered.length===0&&<div style={{ textAlign:"center",padding:"50px 0",color:"#ccc",fontSize:13,fontFamily:FONT }}><div style={{ fontSize:36,marginBottom:12 }}>♦</div>プレイヤーなし</div>}
        {filtered.map(p=>{
          const summary=actionSummary(p);
          const topActions=Object.entries(summary).sort((a,b)=>b[1]-a[1]).slice(0,3);
          return(
            <div key={p.id} onClick={()=>openDetail(p)} style={{ background:"#fff",border:"1px solid #e0e0dc",borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",gap:12,alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.05)",transition:"box-shadow .15s" }} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 3px 10px rgba(0,0,0,0.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,0.05)"}>
              <div style={{ width:40,height:40,borderRadius:"50%",flexShrink:0,background:"#f5f0e8",border:"2px solid #ddd",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,color:SUIT_COLOR(p.suit) }}>{p.suit}</div>
              <div style={{ flex:1,minWidth:0 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"baseline" }}>
                  <span style={{ fontSize:14,color:"#1a1a1a",fontWeight:"bold",fontFamily:FONT }}>{p.name||"名無し"}</span>
                  <span style={{ fontSize:10,color:"#aaa",fontFamily:FONT }}>{[p.tableSize,p.seat,p.skill].filter(Boolean).join(" · ")}</span>
                </div>
                <div style={{ display:"flex",gap:4,marginTop:5,flexWrap:"wrap" }}>
                  {p.tendencies.slice(0,2).map(t=><span key={t} style={{ fontSize:10,padding:"1px 7px",borderRadius:20,background:"#f5ead0",color:"#b08820",border:"1px solid #d4c090",fontFamily:FONT }}>{t}</span>)}
                  {topActions.map(([a,c])=><span key={a} style={{ fontSize:10,padding:"1px 7px",borderRadius:20,background:ACTION_COLOR[a]+"18",color:ACTION_COLOR[a],border:`1px solid ${ACTION_COLOR[a]}44`,fontFamily:FONT }}>{a}×{c}</span>)}
                  {(p.hands||[]).length>0&&<span style={{ fontSize:10,color:"#3060a0",fontFamily:FONT }}>{(p.hands||[]).length}ハンド</span>}
                </div>
              </div>
              <span style={{ color:"#ccc",fontSize:16 }}>›</span>
            </div>
          );
        })}
      </div>
    )}

    {/* DETAIL */}
    {view==="detail"&&selected&&(()=>{
      const summary=actionSummary(selected);
      return(
        <div style={{ padding:"16px" }}>
          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:14 }}>
            <button onClick={()=>setView("list")} style={ghostBtn}>← 一覧</button>
            <button onClick={openEdit} style={{ ...ghostBtn,color:"#b08820",border:"1px solid #d4c090",background:"#f5ead0" }}>✎ 編集</button>
          </div>
          <div style={{ background:"#fff",border:"1px solid #e0e0dc",borderRadius:16,padding:"18px",marginBottom:12,textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
            <div style={{ width:60,height:60,borderRadius:"50%",margin:"0 auto 10px",background:"#f5f0e8",border:"2px solid #ddd",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:SUIT_COLOR(selected.suit) }}>{selected.suit}</div>
            <h2 style={{ margin:"0 0 3px",fontSize:19,fontWeight:"bold",color:"#1a1a1a",fontFamily:FONT }}>{selected.name}</h2>
            <div style={{ fontSize:11,color:"#888",marginBottom:10,fontFamily:FONT }}>
              {[selected.tableSize,selected.seat,selected.skill,selected.vpip&&`VPIP ${selected.vpip}%`,selected.pfr&&`PFR ${selected.pfr}%`].filter(Boolean).join(" · ")}
            </div>
            <div style={{ display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",marginBottom:8 }}>
              {selected.tendencies.map(t=><span key={t} style={{ fontSize:11,padding:"3px 10px",borderRadius:20,background:"#f5ead0",color:"#b08820",border:"1px solid #d4c090",fontFamily:FONT }}>{t}</span>)}
            </div>
            {Object.keys(summary).length>0&&(
              <div style={{ display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center" }}>
                {Object.entries(summary).sort((a,b)=>b[1]-a[1]).map(([a,c])=><span key={a} style={{ fontSize:11,padding:"2px 8px",borderRadius:6,background:ACTION_COLOR[a]+"18",color:ACTION_COLOR[a],border:`1px solid ${ACTION_COLOR[a]}44`,fontFamily:FONT }}>{a} <strong>{c}</strong></span>)}
              </div>
            )}
          </div>
          {selected.notes&&(
            <div style={{ background:"#fff",border:"1px solid #e0e0dc",borderRadius:12,padding:"12px 14px",marginBottom:12 }}>
              <div style={{ fontSize:10,color:"#888",letterSpacing:"0.12em",marginBottom:6,textTransform:"uppercase",fontFamily:FONT }}>メモ</div>
              <p style={{ margin:0,fontSize:13,lineHeight:1.7,color:"#333",whiteSpace:"pre-wrap",fontFamily:FONT }}>{selected.notes}</p>
            </div>
          )}
          {(selected.hands||[]).length>0&&(
            <div>
              <div style={{ fontSize:10,color:"#888",letterSpacing:"0.12em",marginBottom:10,textTransform:"uppercase",fontFamily:FONT }}>ハンド履歴 ({(selected.hands||[]).length})</div>
              {(selected.hands||[]).map(h=>{
                const villains=h.villains||[{id:"v0",pos:h.villainPos||"",range:h.villainRange||[]}];
                return(
                  <div key={h.id} style={{ background:"#fff",border:"1px solid #e0e0dc",borderRadius:10,padding:"10px 12px",marginBottom:8,boxShadow:"0 1px 3px rgba(0,0,0,0.04)" }}>
                    <div style={{ display:"flex",alignItems:"center",gap:5,marginBottom:8,flexWrap:"wrap" }}>
                      <span style={{ fontSize:11,color:"#aaa",fontFamily:"monospace" }}>{h.date}</span>
                      {villains.map((v,vi)=>(
                        <span key={v.id} style={{ display:"inline-flex",gap:3 }}>
                          {v.pos&&<span style={{ fontSize:10,padding:"1px 5px",borderRadius:4,background:VILLAIN_BGS[vi%VILLAIN_BGS.length],color:VILLAIN_COLORS[vi%VILLAIN_COLORS.length],fontFamily:FONT,border:`1px solid ${VILLAIN_BORDERS[vi%VILLAIN_BORDERS.length]}` }}>{villains.length>1?`相${vi+1}`:"相"}{v.pos}</span>}
                          {(v.range||[]).length>0&&<span style={{ fontSize:10,padding:"1px 5px",borderRadius:4,background:VILLAIN_BGS[vi%VILLAIN_BGS.length],color:VILLAIN_COLORS[vi%VILLAIN_COLORS.length],fontFamily:FONT,border:`1px solid ${VILLAIN_BORDERS[vi%VILLAIN_BORDERS.length]}` }}>{totalCombos(v.range)}c</span>}
                        </span>
                      ))}
                      {h.heroPos&&<span style={{ fontSize:10,padding:"1px 5px",borderRadius:4,background:HERO_BG,color:HERO_COLOR,fontFamily:FONT,border:`1px solid ${HERO_BORDER}` }}>自{h.heroPos}</span>}
                      {h.heroHand&&(()=>{ const [c1,c2]=heroHandToCards(h.heroHand); return <span style={{ display:"inline-flex",gap:2 }}>{[c1,c2].map((card,i)=>{ const r=card.slice(0,-1),s=card.slice(-1),isR=s==="h"||s==="d"; return <span key={i} style={{ fontSize:9,padding:"1px 4px",borderRadius:3,background:"#fff",color:isR?"#e05a5a":"#1a1a1a",fontFamily:"monospace",fontWeight:"bold",border:"1px solid #ccc",lineHeight:1.4 }}>{r}{CARD_SUIT_SYMBOL[s]}</span>; })}</span>; })()}
                      {usedBoardCards(h.board||{}).length>0&&(
                        <div style={{ display:"flex",gap:2 }}>
                          {[...(h.board?.flop||[]),h.board?.turn,h.board?.river].filter(Boolean).map((card,i)=>{ const r=card.slice(0,-1),s=card.slice(-1),isR=s==="h"||s==="d"; return <span key={i} style={{ fontSize:10,padding:"2px 4px",borderRadius:3,background:"#fff",color:isR?"#e05a5a":"#1a1a1a",fontFamily:"monospace",fontWeight:"bold",border:"1px solid #ccc" }}>{r}{CARD_SUIT_SYMBOL[s]}</span>; })}
                        </div>
                      )}
                    </div>
                    {STREETS.map(s=>{
                      const acts=(h.streets[s]||[]).filter(a=>a.action);
                      if(!acts.length)return null;
                      return(
                        <div key={s} style={{ marginBottom:5,display:"flex",alignItems:"center",flexWrap:"wrap",gap:4 }}>
                          <span style={{ fontSize:9,padding:"1px 7px",borderRadius:20,background:STREET_COLOR[s]+"18",color:STREET_COLOR[s],border:`1px solid ${STREET_COLOR[s]}44`,fontFamily:FONT }}>{s}</span>
                          {acts.map((a)=>{
                            const vIdx=a.actor==="hero"?-1:villains.findIndex(v=>v.id===a.actor);
                            const col=a.actor==="hero"?HERO_COLOR:VILLAIN_COLORS[(vIdx>=0?vIdx:0)%VILLAIN_COLORS.length];
                            const bg=a.actor==="hero"?HERO_BG:VILLAIN_BGS[(vIdx>=0?vIdx:0)%VILLAIN_BGS.length];
                            const lbl=a.actor==="hero"?"自":(villains.length>1?`相${(vIdx>=0?vIdx:0)+1}`:"相");
                            return <span key={a.id} style={{ display:"inline-flex",alignItems:"center",gap:2,fontSize:10,padding:"2px 7px",borderRadius:6,background:bg,color:col,border:`1px solid ${col}33`,fontFamily:FONT }}><span style={{ opacity:0.6,fontSize:9 }}>{lbl}</span>{a.action}{a.size?` ${a.size}`:""}</span>;
                          })}
                        </div>
                      );
                    })}
                    {h.note&&<p style={{ margin:"6px 0 0",fontSize:12,color:"#888",fontStyle:"italic",fontFamily:FONT }}>{h.note}</p>}
                  </div>
                );
              })}
            </div>
          )}
          <button onClick={()=>handleDelete(selected.id)} style={{ marginTop:10,width:"100%",background:"#fff5f5",border:"1px solid #f0a0a0",borderRadius:10,padding:"10px",color:"#c04040",fontSize:13,cursor:"pointer",fontFamily:FONT }}>削除</button>
        </div>
      );
    })()}

    {/* EDIT */}
    {view==="edit"&&editData&&<PlayerForm initial={editData} onSave={handleSave} onCancel={()=>setView(selectedId?"detail":"list")}/>}
  </div>
</div>
```

);
}
const root = ReactDOM.createRoot(document.getElementById(“root”));
root.render(React.createElement(App));
</script>
